name: CI

on:
  push:
    branches: [main, 'claude/**', 'feature/**']
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Rust 単体テスト (非 Windows でも実行可能なものだけ)
  # ─────────────────────────────────────────────────────────────────
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: src-tauri

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install system deps (WebKit2GTK for Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev

      - name: Run Rust unit tests
        run: cargo test --lib -- --test-threads=1
        env:
          # Windows-only機能はスキップ
          RUST_LOG: debug

  # ─────────────────────────────────────────────────────────────────
  # フロントエンド: 型チェック + Lint
  # ─────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend Type Check & Lint
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────
  # Windows ビルドチェック (PR マージ前の最終確認)
  # ─────────────────────────────────────────────────────────────────
  windows-build:
    name: Windows Build Check
    runs-on: windows-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check Rust compilation
        working-directory: src-tauri
        run: cargo check --target x86_64-pc-windows-msvc
